databases:
  - name: gethired-db
    databaseName: gethired
    user: gethireduser
    plan: free

services:
  - type: web
    name: gethired-api
    env: docker
    rootDir: server
    plan: free
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: gethired-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gethired-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gethired-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://get-hired-mu.vercel.app,https://get-hired-client.vercel.app"

