databases:
  - name: gethired-db
    databaseName: gethired
    user: gethireduser

services:
  - type: web
    name: gethired-api
    env: docker
    rootDir: server
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: gethired-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gethired-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gethired-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://your-vercel-frontend-url.vercel.app" # Replace with actual Vercel URL
