services:
  # PostgreSQL Database
  - type: pgo
    name: gethired-db
    plan: free

  # Spring Boot Backend
  - type: web
    name: gethired-api
    env: java
    plan: free
    rootDir: server
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/server-0.0.1-SNAPSHOT.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: gethired-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: gethired-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: gethired-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "https://your-vercel-frontend-url.vercel.app" # Replace with actual Vercel URL
